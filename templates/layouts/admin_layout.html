{% extends "base.html" %}

{% block content %}
<section class="w-full px-4 py-6 sm:px-6 lg:px-8">
    <div class="grid gap-6 lg:grid-cols-[300px_minmax(0,1fr)] lg:items-start">
        <aside class="tint-panel rounded-[1.9rem] p-6 lg:sticky lg:top-24 lg:max-h-[calc(100vh-7rem)] lg:overflow-y-auto">
            <div class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-4 py-2 text-sm font-semibold text-emerald-800">
                <span class="flex h-6 w-6 items-center justify-center rounded-full bg-emerald-600 text-white">
                    <svg class="h-3.5 w-3.5" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <path d="M8 2.5l4.5 2.25v3.2c0 2.6-1.73 4.99-4.5 5.8-2.77-.81-4.5-3.2-4.5-5.8v-3.2L8 2.5z" fill="currentColor"/>
                    </svg>
                </span>
                Espace admin
            </div>
            <div class="mt-4">
                <h1 class="text-[2rem] font-semibold leading-tight tracking-[-0.04em] text-slate-950">Supervision Fintech-IAM</h1>
            </div>
            <div class="mt-8">
                <p class="mb-3 text-[0.72rem] uppercase tracking-[0.18em] text-slate-500">Pilotage</p>
                <div class="grid gap-2">
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_dashboard' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M2.5 8.5h3v5h-3v-5zm4-6h3v11h-3v-11zm4 3h3v8h-3v-8z" fill="currentColor"/></svg></span>Tableau de bord</a>
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_commission_list' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_commission_list' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M8 2.5a3 3 0 100 6 3 3 0 000-6zm0 7.5c-2.76 0-5 1.12-5 2.5V13.5h10v-1c0-1.38-2.24-2.5-5-2.5z" fill="currentColor"/></svg></span>Commissions</a>
                </div>
            </div>
            <div class="mt-8">
                <p class="mb-3 text-[0.72rem] uppercase tracking-[0.18em] text-slate-500">Référentiels</p>
                <div class="grid gap-2">
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_agent_list' or request.resolver_match.url_name == 'admin_agent_detail' or request.resolver_match.url_name == 'admin_agent_create' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_agent_list' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M5.5 7a2 2 0 100-4 2 2 0 000 4zm5 1a2 2 0 100-4 2 2 0 000 4zM2.5 12.5c0-1.1 1.34-2 3-2s3 .9 3 2V13.5h-6v-1zm6 0c0-1.1 1.34-2 3-2s3 .9 3 2V13.5h-6v-1z" fill="currentColor"/></svg></span>Agents</a>
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_client_list' or request.resolver_match.url_name == 'admin_client_detail' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_client_list' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M8 2.5a3 3 0 100 6 3 3 0 000-6zm-4.5 10c0-1.66 2.02-3 4.5-3s4.5 1.34 4.5 3V13.5h-9v-1z" fill="currentColor"/></svg></span>Clients</a>
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_cycle_list' or request.resolver_match.url_name == 'admin_cycle_detail' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_cycle_list' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M3 8h10M3 11.5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>Cycles</a>
                </div>
            </div>
            <div class="mt-8">
                <p class="mb-3 text-[0.72rem] uppercase tracking-[0.18em] text-slate-500">Flux financiers</p>
                <div class="grid gap-2">
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_depot_list' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_depot_list' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M8 2.5v11m-4-4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Dépôts</a>
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_retrait_list' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_retrait_list' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M8 13.5v-11m-4 4l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Retraits</a>
                    <a class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'admin_mouvement_list' %}bg-[linear-gradient(135deg,rgba(15,118,110,0.14),rgba(15,23,42,0.08))] text-slate-950{% else %}text-slate-600 hover:bg-white/70 hover:text-slate-950{% endif %}" href="{% url 'admin_mouvement_list' %}"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/80 text-emerald-700"><svg class="h-4 w-4" viewBox="0 0 16 16" fill="none"><path d="M2.5 11.5l3-3 2 2 4-5 2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Mouvements</a>
                </div>
            </div>
        </aside>
        <div class="glass-panel min-h-[calc(100vh-7rem)] rounded-[2.2rem] p-7">
            {% block workspace %}{% endblock %}
        </div>
    </div>
</section>
{% endblock %}
