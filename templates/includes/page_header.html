<div class="mb-6 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div>
        {% if eyebrow %}
            <p class="mb-2 text-[0.78rem] font-semibold uppercase tracking-[0.18em] text-emerald-700">{{ eyebrow }}</p>
        {% endif %}
        <h1 class="text-4xl font-semibold tracking-[-0.05em] text-slate-950">{{ title }}</h1>
        {% if description %}
            <p class="mt-3 max-w-4xl text-lg leading-8 text-slate-600">{{ description }}</p>
        {% endif %}
    </div>
    {% if action_links %}
        <div class="flex flex-wrap gap-3">
            {% for action in action_links %}
                <a class="{{ action.class_name }}" href="{{ action.href }}">{{ action.label }}</a>
            {% endfor %}
        </div>
    {% endif %}
</div>
