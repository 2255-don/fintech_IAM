{% if messages %}
    <div class="fixed right-5 top-5 z-[60] grid w-[min(24rem,calc(100vw-2rem))] gap-3" aria-live="polite" aria-atomic="true">
        {% for message in messages %}
            <div class="grid grid-cols-[minmax(0,1fr)_auto] items-start gap-4 rounded-[1.35rem] border bg-white/97 p-4 shadow-[0_24px_50px_rgba(15,23,42,0.14)] backdrop-blur {% if 'error' in message.tags %}border-rose-200 border-l-4 border-l-red-600{% elif 'warning' in message.tags %}border-amber-200 border-l-4 border-l-amber-500{% elif 'success' in message.tags %}border-emerald-200 border-l-4 border-l-emerald-600{% else %}border-sky-200 border-l-4 border-l-sky-600{% endif %}" data-toast>
                <div>
                    <p class="text-[0.8rem] font-bold uppercase tracking-[0.14em] text-slate-600">
                        {% if 'error' in message.tags %}
                            Action en erreur
                        {% elif 'warning' in message.tags %}
                            Attention
                        {% elif 'success' in message.tags %}
                            Action reussie
                        {% else %}
                            Information
                        {% endif %}
                    </p>
                    <p class="mt-1.5 text-sm leading-6 text-slate-900">{{ message }}</p>
                </div>
                <button class="px-1 text-2xl leading-none text-slate-400 transition hover:text-slate-700" type="button" data-toast-close aria-label="Fermer le message">&times;</button>
            </div>
        {% endfor %}
    </div>
{% endif %}
