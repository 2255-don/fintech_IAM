<article class="rounded-[1.45rem] border border-white/70 bg-white/88 p-5 shadow-[0_20px_45px_rgba(15,23,42,0.08)] backdrop-blur">
    <p class="mb-2 text-sm text-slate-500">{{ label }}</p>
    <p class="text-4xl font-semibold tracking-[-0.05em] text-slate-950">{{ value }}</p>
    {% if note %}
        <p class="mt-3 text-base leading-7 text-slate-600">{{ note }}</p>
    {% endif %}
</article>
