<div class="rounded-[2rem] border border-white/70 bg-white/92 p-8 shadow-[0_20px_45px_rgba(15,23,42,0.08)] backdrop-blur">
    <p class="text-xs font-semibold uppercase tracking-[0.22em] text-amber-700">{{ code }}</p>
    <h1 class="mt-4 text-4xl font-semibold tracking-[-0.05em] text-slate-950">{{ title }}</h1>
    <p class="mt-4 max-w-3xl text-lg leading-8 text-slate-600">{{ description }}</p>
    <div class="mt-8 flex flex-wrap gap-3">
        <a class="inline-flex items-center rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white shadow-[0_14px_28px_rgba(15,23,42,0.18)] transition hover:bg-emerald-700" href="{% url 'home' %}">Retour a l'accueil</a>
        {% if request.user.is_authenticated %}
            <a class="inline-flex items-center rounded-full border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:border-emerald-300 hover:text-emerald-700" href="{% url 'dashboard_redirect' %}">Aller au tableau de bord</a>
        {% else %}
            <a class="inline-flex items-center rounded-full border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:border-emerald-300 hover:text-emerald-700" href="{% url 'login' %}">Se connecter</a>
        {% endif %}
    </div>
</div>
